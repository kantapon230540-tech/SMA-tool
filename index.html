        const site = document.getElementById('si-site')?.value||'';
        const date = document.getElementById('si-date')?.value||'';
        const assessor = document.getElementById('si-assessor')?.value||'';
        const type = document.getElementById('si-type')?.value||'validation';
        writeCell(wsd, 4, 6, site);
        writeCell(wsd, 5, 6, date);
        writeCell(wsd, 6, 6, assessor);
        writeCell(wsd, 7, 6, type==='validation'?'Validation Assessment':'Self-Assessment');
        // Clean Japanese from dashboard
        for(const cellAddr in wsd){
          if(cellAddr[0]==='!') continue;
          const cell = wsd[cellAddr];
          if(cell && cell.t==='s' && cell.v && cell.v.includes('\n')){
            cell.v = cell.v.split('\n')[0].trim();
            if(cell.w) cell.w = cell.v;
          }
        }
        // Pillar summary rows 48-51: G=Strength, J=OFI, M=Action, P=Due
        const pillars = [
          {key:'Leadership',row:48},{key:'TMEngagement',row:49},
          {key:'Organization',row:50},{key:'System',row:51}
        ];
        pillars.forEach(({key,row})=>{
          writeCell(wsd, row, 7,  window['str_'+key]||'');
          writeCell(wsd, row, 10, window['ofi_'+key]||'');
        });
        // Action items - distribute across pillar rows
        const ai = actionItems.filter(a=>a.item?.trim());
        ai.slice(0,4).forEach((a,i)=>{
          writeCell(wsd, 48+i, 13, a.item||'');
          writeCell(wsd, 48+i, 16, a.due||'');
        });
      }

      // Write file
      const sname = (document.getElementById('si-site')?.value||'site').replace(/[\s/\\:*?"<>|]/g,'_');
      const fname = `SMA_Template_${sname}_${new Date().toISOString().split('T')[0]}.xlsx`;
      XLSX.writeFile(wb, fname, {bookType:'xlsx', type:'binary', cellStyles:true});
      showFlash('✓ Original template exported');
    } catch(err){
      alert('Export failed: ' + err.message);
      console.error(err);
    }
  };
  inp.click();
}


// ═══════════════════════════════════════════════════════════
// SUBMIT TO GOOGLE SHEETS
// ═══════════════════════════════════════════════════════════
async function submitToSheets(){
  if(!APPS_SCRIPT_URL){
    alert('Apps Script URL not configured.\n\nOpen the HTML file in a text editor and paste your deployed Apps Script URL into:\n\nconst APPS_SCRIPT_URL = \'YOUR_URL_HERE\';');
    return;
  }

  const site = document.getElementById('si-site')?.value||'';
  if(!site.trim()){
    alert('Please enter a Site / Location name before submitting.');
    return;
  }

  const sc = calcAllScores();
  const elSc = calcElementScores();
  const stats = completionStats();
  const submitMode = document.getElementById('submit-mode')?.value || 'overwrite';
  const statusEl = document.getElementById('submit-status');

  // Build payload
  const payload = {
    submitMode,
    meta: {
      site: site,
      date: document.getElementById('si-date')?.value || '',
      assessor: document.getElementById('si-assessor')?.value || '',
      type: document.getElementById('si-type')?.value || 'validation',
      submittedAt: new Date().toISOString()
    },
    scores: {
      overall: sc.overall,
      safetyAwareness: sc.awareness,
      systemImplementation: sc.sysImpl,
      leadership: sc.l,
      engagement: sc.e,
      organization: sc.o,
      system: sc.s
    },
    elementScores: elSc,
    completionPct: stats.pct,
    totalAnswered: stats.answered,
    responses: responses,
    evidence: evidence,
    summary: {
      str_Leadership:    window['str_Leadership']    || '',
      ofi_Leadership:    window['ofi_Leadership']    || '',
      str_TMEngagement:  window['str_TMEngagement']  || '',
      ofi_TMEngagement:  window['ofi_TMEngagement']  || '',
      str_Organization:  window['str_Organization']  || '',
      ofi_Organization:  window['ofi_Organization']  || '',
      str_System:        window['str_System']        || '',
      ofi_System:        window['ofi_System']        || ''
    },
    actionItems: actionItems,
    // Send full question list so Apps Script can write per-question rows
    questions: QUESTIONS.map(q => ({
      pillar: q.pillar,
      element: q.element,
      system_cat: q.system_cat,
      id: q.id,
      level: q.level,
      text: q.text,
      who: q.who
    }))
  };

  // Update UI
  if(statusEl) statusEl.textContent = '⏳ Submitting...';
  statusEl.style.color = '#666';

  try {
    // Send as FormData — no-cors mode strips JSON body but carries FormData correctly
    const formData = new FormData();
    formData.append('data', JSON.stringify(payload));

    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: formData
    });

    // no-cors gives opaque response — no JS error = request reached server
    if(statusEl){
      statusEl.textContent = `✓ Submitted — ${site} (${new Date().toLocaleTimeString()})`;
      statusEl.style.color = '#27ae60';
    }
    showFlash(`✓ ${site} submitted to Google Sheets`);

  } catch(err) {
    if(statusEl){
      statusEl.textContent = `✗ Failed: ${err.message}`;
      statusEl.style.color = '#e31837';
    }
    console.error('Submit error:', err);
    alert('Submission failed: ' + err.message + '\n\nCheck Apps Script URL and deployment settings.');
  }
}


function dl(content,filename,type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}
