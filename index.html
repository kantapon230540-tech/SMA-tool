<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-SMS Safety Maturity Assessment — Validation Tool</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
  --bs-navy: #003087;
  --bs-blue: #0057A8;
  --bs-red: #E31837;
  --bs-gold: #FFC72C;
  --bs-dark: #1a1a2e;
  --bs-gray: #f4f6f9;
  --bs-border: #dde3ec;
  --bs-text: #1e2a3a;
  --bs-muted: #6b7a90;
  --level-1: #c0392b;
  --level-2: #e67e22;
  --level-3: #f1c40f;
  --level-4: #27ae60;
  --level-5: #003087;
  --shadow: 0 2px 12px rgba(0,48,135,0.10);
  --shadow-lg: 0 8px 32px rgba(0,48,135,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bs-gray);color:var(--bs-text);font-size:14px;line-height:1.5;}

/* ── HEADER ── */
.app-header{background:linear-gradient(135deg,var(--bs-navy) 0%,var(--bs-blue) 100%);color:#fff;padding:18px 30px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-lg);}
.app-header-left h1{font-size:20px;font-weight:700;letter-spacing:.3px;}
.app-header-left p{font-size:11px;opacity:.75;margin-top:2px;}
.header-scores{display:flex;gap:16px;}
.hs-card{background:rgba(255,255,255,.12);border-radius:8px;padding:8px 14px;text-align:center;min-width:80px;}
.hs-card .val{font-size:22px;font-weight:800;color:var(--bs-gold);}
.hs-card .lbl{font-size:10px;opacity:.8;margin-top:1px;}

/* ── SITE INFO ── */
.site-bar{background:#fff;border-bottom:2px solid var(--bs-border);padding:12px 30px;display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;}
.si-field{display:flex;flex-direction:column;gap:3px;min-width:160px;}
.si-field label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--bs-muted);letter-spacing:.5px;}
.si-field input,.si-field select{border:1px solid var(--bs-border);border-radius:6px;padding:6px 10px;font-size:13px;color:var(--bs-text);background:#fff;outline:none;transition:border .2s;}
.si-field input:focus,.si-field select:focus{border-color:var(--bs-blue);}

/* ── MAIN LAYOUT ── */
.app-body{display:flex;min-height:calc(100vh - 120px);}

/* ── SIDEBAR TABS ── */
.sidebar{width:200px;background:#fff;border-right:2px solid var(--bs-border);flex-shrink:0;padding:16px 0;}
.side-tab{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;color:var(--bs-muted);font-weight:500;}
.side-tab:hover{background:var(--bs-gray);color:var(--bs-navy);}
.side-tab.active{border-left-color:var(--bs-blue);background:linear-gradient(90deg,rgba(0,87,168,.06),transparent);color:var(--bs-navy);font-weight:700;}
.side-tab .tab-icon{font-size:16px;width:20px;text-align:center;}
.side-tab .tab-info{flex:1;}
.side-tab .tab-title{font-size:12px;}
.side-tab .tab-score{font-size:10px;color:var(--bs-muted);margin-top:1px;}
.side-tab.active .tab-score{color:var(--bs-blue);}
.sidebar-sep{height:1px;background:var(--bs-border);margin:8px 16px;}

/* ── CONTENT AREA ── */
.content{flex:1;padding:20px 24px;overflow-y:auto;max-height:calc(100vh - 120px);}
.pillar-page{display:none;}
.pillar-page.active{display:block;}

/* ── SEARCH BAR ── */
.search-bar{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:16px;box-shadow:var(--shadow);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.search-bar input{flex:1;min-width:200px;border:1px solid var(--bs-border);border-radius:6px;padding:7px 12px;font-size:13px;outline:none;}
.search-bar input:focus{border-color:var(--bs-blue);}
.search-bar select{border:1px solid var(--bs-border);border-radius:6px;padding:7px 10px;font-size:12px;background:#fff;outline:none;color:var(--bs-text);}
.search-bar button{background:var(--bs-muted);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer;}
.search-stats{font-size:11px;color:var(--bs-muted);width:100%;}

/* ── ELEMENT SECTION ── */
.element-block{background:#fff;border-radius:10px;margin-bottom:16px;box-shadow:var(--shadow);overflow:hidden;}
.element-header{background:linear-gradient(90deg,var(--bs-navy),var(--bs-blue));color:#fff;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;}
.element-header h3{font-size:14px;font-weight:700;}
.element-badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;}
.subcat-header{background:linear-gradient(90deg,#e8eef6,#f4f6f9);padding:8px 18px;font-size:11px;font-weight:700;color:var(--bs-navy);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bs-border);}

/* ── QUESTION ROW ── */
.q-row{padding:12px 18px;border-bottom:1px solid #f0f2f5;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;transition:background .15s;}
.q-row:hover{background:#fafbfd;}
.q-row.hidden{display:none;}
.q-row:last-child{border-bottom:none;}
.q-meta{display:flex;gap:6px;flex-shrink:0;align-items:flex-start;padding-top:2px;}
.q-num{font-size:11px;font-weight:700;color:var(--bs-blue);background:#e3f0fb;padding:2px 8px;border-radius:12px;white-space:nowrap;}
.q-level-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.lvl-Ad-hoc{background:#fde8e8;color:#c0392b;}
.lvl-Reactive{background:#fef0e0;color:#d35400;}
.lvl-Standardized{background:#fef9e0;color:#b7900a;}
.lvl-Proactive{background:#e8f8ee;color:#1e8449;}
.lvl-Excellence{background:#e0eafb;color:#003087;}
.q-body{flex:1;min-width:260px;}
.q-text{font-size:13px;color:var(--bs-text);margin-bottom:6px;}
.q-criteria{font-size:11px;color:var(--bs-muted);background:#f8f9fb;border-left:3px solid var(--bs-border);padding:5px 8px;border-radius:0 4px 4px 0;display:none;margin-top:4px;}
.q-criteria.show{display:block;}
.criteria-toggle{font-size:10px;color:var(--bs-blue);cursor:pointer;text-decoration:underline;margin-top:2px;display:inline-block;}
.q-method-who{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.method-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;}
.mb-Interview{background:#dff5fb;color:#0e6e8a;}
.mb-Observation{background:#fff0d9;color:#8a5a00;}
.mb-Document{background:#efefef;color:#444;}
.who-badge{font-size:10px;color:var(--bs-muted);background:#f0f0f0;padding:2px 7px;border-radius:8px;}
.q-controls{display:flex;flex-direction:column;gap:6px;min-width:240px;}
.response-btns{display:flex;gap:5px;flex-wrap:wrap;}
.r-btn{padding:5px 12px;border-radius:16px;border:1.5px solid var(--bs-border);background:#fff;cursor:pointer;font-size:11px;font-weight:600;color:var(--bs-muted);transition:all .15s;}
.r-btn:hover{border-color:var(--bs-blue);color:var(--bs-blue);}
.r-btn.sel-yes{background:#27ae60;border-color:#27ae60;color:#fff;}
.r-btn.sel-no{background:#e31837;border-color:#e31837;color:#fff;}
.r-btn.sel-na{background:#95a5a6;border-color:#95a5a6;color:#fff;}
.r-btn.sel-nr{background:#e67e22;border-color:#e67e22;color:#fff;}
.evidence-row{display:flex;gap:5px;align-items:center;}
.evidence-row input{flex:1;border:1px solid var(--bs-border);border-radius:6px;padding:5px 8px;font-size:11px;outline:none;}
.evidence-row input:focus{border-color:var(--bs-blue);}
.attach-btn{background:var(--bs-navy);color:#fff;border:none;border-radius:6px;padding:5px 8px;font-size:10px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.attach-info{font-size:10px;color:#27ae60;margin-top:2px;}

/* ── PILLAR SUMMARY BAR ── */
.pillar-summary{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:16px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.ps-title{font-weight:700;color:var(--bs-navy);font-size:15px;}
.ps-elements{display:flex;gap:10px;flex-wrap:wrap;}
.ps-elem{text-align:center;background:var(--bs-gray);border-radius:8px;padding:6px 14px;}
.ps-elem .ev{font-size:18px;font-weight:800;color:var(--bs-navy);}
.ps-elem .el{font-size:10px;color:var(--bs-muted);}

/* ── PROGRESS ── */
.progress-wrap{background:var(--bs-gray);height:6px;border-radius:3px;overflow:hidden;margin-top:4px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--bs-blue),var(--bs-gold));transition:width .3s;border-radius:3px;}

/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.dash-card{background:#fff;border-radius:10px;padding:16px;box-shadow:var(--shadow);text-align:center;}
.dash-card .dval{font-size:32px;font-weight:800;color:var(--bs-navy);}
.dash-card .dlbl{font-size:11px;color:var(--bs-muted);margin-top:3px;}
.dash-card .dbadge{margin-top:6px;}
.maturity-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;}
.mb-1{background:#fde8e8;color:#c0392b;} .mb-2{background:#fef0e0;color:#d35400;}
.mb-3{background:#fef9e0;color:#b7900a;} .mb-4{background:#e8f8ee;color:#1e8449;}
.mb-5{background:#e0eafb;color:#003087;}
.radar-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.radar-box{background:#fff;border-radius:10px;padding:20px;box-shadow:var(--shadow);}
.radar-box h4{font-size:13px;font-weight:700;color:var(--bs-navy);margin-bottom:12px;}
.radar-box canvas{max-height:280px;}
.dash-section{background:#fff;border-radius:10px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px;}
.dash-section h4{font-size:13px;font-weight:700;color:var(--bs-navy);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--bs-border);}
.ofi-table{width:100%;border-collapse:collapse;}
.ofi-table th{background:var(--bs-gray);padding:8px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--bs-muted);text-transform:uppercase;}
.ofi-table td{padding:8px 10px;border-bottom:1px solid var(--bs-border);font-size:12px;vertical-align:top;}
.ofi-table tr:last-child td{border-bottom:none;}
.action-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.action-row input{flex:1;border:1px solid var(--bs-border);border-radius:6px;padding:6px 8px;font-size:12px;outline:none;}
.action-row input:focus{border-color:var(--bs-blue);}
.btn-add{background:var(--bs-blue);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;}
.btn-export{background:#27ae60;color:#fff;border:none;border-radius:6px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;margin-right:8px;}
.btn-reset{background:var(--bs-muted);color:#fff;border:none;border-radius:6px;padding:8px 18px;font-size:13px;cursor:pointer;}
.export-row{margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;}
.comp-label{font-size:11px;color:var(--bs-muted);text-align:center;margin-top:4px;}
/* Saved flash */
.saved-flash{position:fixed;top:16px;right:20px;background:#27ae60;color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
.saved-flash.show{opacity:1;}
/* Heatmap */
.heatmap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:8px;}
.heatmap-cell{border-radius:8px;padding:10px 12px;text-align:center;}
.hm-0{background:#f0f2f5;color:#999;}
.hm-low{background:#fde8e8;color:#c0392b;}
.hm-mid{background:#fef9e0;color:#8a6d00;}
.hm-ok{background:#e8f8ee;color:#1e8449;}
.hm-high{background:#e0eafb;color:#003087;}
.heatmap-cell .hm-val{font-size:20px;font-weight:800;}
.heatmap-cell .hm-lbl{font-size:10px;margin-top:2px;}
.heatmap-cell .hm-pct{font-size:11px;font-weight:600;margin-top:2px;}
/* Red zone table */
.redzone-row td{vertical-align:middle;}
.gap-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;}
.gap-critical{background:#fde8e8;color:#c0392b;}
.gap-warning{background:#fef0e0;color:#d35400;}
.gap-ok{background:#e8f8ee;color:#1e8449;}
/* NG list */
.ng-item{padding:8px 12px;border-left:3px solid var(--bs-red);background:#fff8f8;border-radius:0 6px 6px 0;margin-bottom:6px;}
.ng-item .ng-q{font-size:12px;color:var(--bs-text);}
.ng-item .ng-meta{font-size:10px;color:var(--bs-muted);margin-top:2px;}
.ng-evidence{font-size:10px;color:#666;font-style:italic;margin-top:2px;}

/* ── LEVEL TABLE ── */
.level-legend{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:16px;box-shadow:var(--shadow);}
.level-legend h4{font-size:12px;font-weight:700;color:var(--bs-navy);margin-bottom:8px;}
.level-legend table{width:100%;border-collapse:collapse;}
.level-legend td{padding:4px 8px;font-size:11px;border-bottom:1px solid #f0f0f0;}
.level-legend tr:last-child td{border:none;}

@media(max-width:900px){
  .sidebar{width:160px;}
  .radar-row{grid-template-columns:1fr;}
  .app-header{flex-direction:column;gap:10px;}
}
@media(max-width:640px){
  .sidebar{display:none;}
  .content{padding:12px;}
}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-header-left">
    <h1>G-SMS Safety Maturity Assessment</h1>
    <p>Validation Assessment Tool &nbsp;|&nbsp; 4 Pillars &nbsp;|&nbsp; 12 Elements &nbsp;|&nbsp; 159 Questions</p>
  </div>
  <div class="header-scores">
    <div class="hs-card"><div class="val" id="hdr-overall">—</div><div class="lbl">Overall</div></div>
    <div class="hs-card"><div class="val" id="hdr-awareness">—</div><div class="lbl">Safety Awareness</div></div>
    <div class="hs-card"><div class="val" id="hdr-system">—</div><div class="lbl">System Impl.</div></div>
    <div class="hs-card"><div class="val" id="hdr-pct">0%</div><div class="lbl">Complete</div></div>
  </div>
</div>

<div class="site-bar">
  <div class="si-field"><label>Site / Location</label><input type="text" id="si-site" placeholder="e.g. BSANZ Truganina WH"></div>
  <div class="si-field"><label>Assessment Date</label><input type="date" id="si-date"></div>
  <div class="si-field"><label>Assessor Name</label><input type="text" id="si-assessor" placeholder="e.g. Kantapon A."></div>
  <div class="si-field"><label>Assessment Type</label>
    <select id="si-type">
      <option value="validation">Validation Assessment</option>
      <option value="self">Self-Assessment</option>
    </select>
  </div>
  <div class="si-field" style="flex-direction:row;align-items:flex-end;gap:6px;flex-wrap:wrap;">
    <button onclick="saveToLocalAndFile()" style="background:var(--bs-navy);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;">💾 Save</button>
    <label style="background:#0057A8;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;white-space:nowrap;">
      📂 Load <input type="file" id="load-file-input" accept=".json" style="display:none" onchange="loadFromFile(event)">
    </label>
    <button onclick="confirmReset()" style="background:var(--bs-muted);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;">🔄 Reset</button>
  </div>
</div>
<div class="saved-flash" id="saved-flash">✓ Saved</div>

<div class="app-body">
  <nav class="sidebar">
    <div class="side-tab active" data-page="leadership" onclick="switchPage('leadership')">
      <span class="tab-icon">🏛️</span>
      <div class="tab-info"><div class="tab-title">Leadership</div><div class="tab-score" id="st-leadership">Level —</div></div>
    </div>
    <div class="side-tab" data-page="engagement" onclick="switchPage('engagement')">
      <span class="tab-icon">👥</span>
      <div class="tab-info"><div class="tab-title">TM Engagement</div><div class="tab-score" id="st-engagement">Level —</div></div>
    </div>
    <div class="side-tab" data-page="organization" onclick="switchPage('organization')">
      <span class="tab-icon">🏢</span>
      <div class="tab-info"><div class="tab-title">Organization</div><div class="tab-score" id="st-organization">Level —</div></div>
    </div>
    <div class="side-tab" data-page="system" onclick="switchPage('system')">
      <span class="tab-icon">⚙️</span>
      <div class="tab-info"><div class="tab-title">System</div><div class="tab-score" id="st-system">Level —</div></div>
    </div>
    <div class="sidebar-sep"></div>
    <div class="side-tab" data-page="dashboard" onclick="switchPage('dashboard')">
      <span class="tab-icon">📊</span>
      <div class="tab-info"><div class="tab-title">Dashboard</div><div class="tab-score">Results & Export</div></div>
    </div>
  </nav>

  <main class="content">
    <div id="page-leadership" class="pillar-page active"></div>
    <div id="page-engagement" class="pillar-page"></div>
    <div id="page-organization" class="pillar-page"></div>
    <div id="page-system" class="pillar-page"></div>
    <div id="page-dashboard" class="pillar-page"></div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// QUESTION DATABASE — 159 questions from official checklist
// ═══════════════════════════════════════════════════════════
</script>
<script>
const QUESTIONS = [
// ── LEADERSHIP ──
{pillar:"leadership",element:"Prioritization",system_cat:"",id:1,level:"Ad-hoc",text:"Have safety procedures been evaluated to ensure they are compliant with OH&S regulations?",who:"Site manager",methods:["Interview"],criteria:"The respondent can explain how safety procedures have been evaluated to ensure they are compliant with OH&S regulations."},
{pillar:"leadership",element:"Decisions",system_cat:"",id:2,level:"Ad-hoc",text:"Have you monitored the H&S and DP regulations which may be applicable for your site and checked that these regulations have been taken place in your sites? (e.g. trainings, mobile equipment, chemicals, flammable materials)",who:"Site manager",methods:["Observation","Document"],criteria:"The H&S and DP regulations are listed up and actions in the site are determined. Besides, the site is compliant with these regulations."},
{pillar:"leadership",element:"Support",system_cat:"",id:3,level:"Ad-hoc",text:"Does your site manager consider safety a priority and address safety at the morning assembly, roll-call, etc.?",who:"Teammate",methods:["Interview"],criteria:"All respondents can show examples that the site manager addresses at the morning assembly, roll call, etc."},
{pillar:"leadership",element:"Support",system_cat:"",id:4,level:"Reactive",text:"What does site leadership (e.g. site manager and supervisor) do when a serious incident (lost-time-injury, fire accident, etc.) occurs?",who:"Teammate",methods:["Interview"],criteria:"All respondents stated that site leadership was involved in the root cause analysis process when a serious incident occurred."},
{pillar:"leadership",element:"Prioritization",system_cat:"",id:5,level:"Reactive",text:"Does site manager review lagging OH&S KPIs (e.g. number of incidents, frequency, severity) at least monthly?",who:"Site manager",methods:["Interview"],criteria:"Site leadership follows safety lagging OH&S KPIs, and give directions to review the safety program if necessary."},
{pillar:"leadership",element:"Prioritization",system_cat:"",id:6,level:"Reactive",text:"Are the root causes of incidents categorized and then tracked?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"The cause of incident in the most recent year has been determined and the countermeasures are followed-up by the termination."},
{pillar:"leadership",element:"Decisions",system_cat:"",id:7,level:"Reactive",text:"Are safety initiatives being implemented to improve safety? Is there any document to show that?",who:"Site manager or if available, site safety",methods:["Interview","Document"],criteria:"Site leadership can show a plan to improve safety activities in the site and explain that the plan is implemented."},
{pillar:"leadership",element:"Support",system_cat:"",id:8,level:"Standardized",text:"Does Site leaders actively provide feedback to teammates and promote safety whilst on tours?",who:"Site manager and Supervisor",methods:["Interview"],criteria:"The respondents can show an example that they provide feedbacks to teammates to ensure adherence to safety rules."},
{pillar:"leadership",element:"Support",system_cat:"",id:9,level:"Standardized",text:"What is your responsibility for safety?",who:"Teammate",methods:["Interview"],criteria:"All respondents can explain their own responsibilities for safety. (e.g. participation of safety activity, etc.)"},
{pillar:"leadership",element:"Decisions",system_cat:"",id:10,level:"Standardized",text:"Do you know how important teammates' involvement in safety is? Do you explain the importance to teammates and involve them in safety activities?",who:"Site manager",methods:["Interview"],criteria:"Site manager could both explain why teammate involvement in safety management is important and can provide examples of actions taken to promote this and the results of those actions."},
{pillar:"leadership",element:"Decisions",system_cat:"",id:11,level:"Standardized",text:"Is there a H&S meeting with representation from teammates, leadership and site H&S (if available)? Does leadership give directions to solve issues?",who:"Site manager",methods:["Document"],criteria:"The meeting minute indicates that the meetings are held at planned intervals and the participants discuss the improvement of safety on site."},
{pillar:"leadership",element:"Prioritization",system_cat:"",id:12,level:"Standardized",text:"Are there repercussions/consequences for teammates that do not follow the Safety Rules and Procedures?",who:"Site manager",methods:["Document"],criteria:"Site manager can show disciplinary procedure or documented examples (e.g. consequence matrix) of carrying out disciplinary action."},
{pillar:"leadership",element:"Prioritization",system_cat:"",id:13,level:"Proactive",text:"Does site manager follow and review 'Leading indicators' in their safety result tracking?",who:"Site manager",methods:["Interview"],criteria:"Site leadership follow not only lagging indicator but also leading indicators, and give directions to review and/or improve safety programs if necessary."},
{pillar:"leadership",element:"Decisions",system_cat:"",id:14,level:"Proactive",text:"Can you show examples of implemented safety measures based on teammate feedback?",who:"Site manager or if available, site safety",methods:["Interview","Document"],criteria:"The respondents can show an example of ongoing safety project with allocated budgets."},
{pillar:"leadership",element:"Prioritization",system_cat:"",id:15,level:"Proactive",text:"When creating the annual (or more) safety implementation plan, do you consider the KPI result/progress in previous year?",who:"Site manager or if available, site safety",methods:["Interview","Document"],criteria:"The respondent can explain an example that was changed from annual planning for previous year and its reason."},
{pillar:"leadership",element:"Support",system_cat:"",id:16,level:"Proactive",text:"Do you recognize good safety behaviors of teammates and give them rewards?",who:"Site manager",methods:["Interview"],criteria:"Site manager can explain an example of this kind of reward in the most recent year."},
{pillar:"leadership",element:"Support",system_cat:"",id:17,level:"Proactive",text:"Does management have a mid-term plan including Safety and DP items and their necessary resources to improve safety on site?",who:"Site manager",methods:["Document"],criteria:"The plan clarifies the Safety and/or DP items and their presumed resources to implement."},
{pillar:"leadership",element:"Decisions",system_cat:"",id:18,level:"Excellence",text:"Have you gathered best practices on safety activity from GBS/SBU, and implement them in the site?",who:"Site manager or if available, site safety",methods:["Interview"],criteria:"The respondents can give examples of industry best practices, where they came from and how they are being implemented on site."},
{pillar:"leadership",element:"Support",system_cat:"",id:19,level:"Excellence",text:"Is there an external/cross site safety meeting? If so, does safety manager share H&S issues or best practices?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"Meeting minute indicate that the respondent contributes to discussion in the safety meeting."},
{pillar:"leadership",element:"Support",system_cat:"",id:20,level:"Excellence",text:"Do you feel comfortable stopping work if you feel there is a risk of injury?",who:"Teammate",methods:["Interview"],criteria:"All respondents confirm that they feel safety is essential. They are comfortable stopping work when they feel their safety is compromised."},
{pillar:"leadership",element:"Prioritization",system_cat:"",id:21,level:"Excellence",text:"Do you motivate teammates to find and implement new best practices relevant to safety in other BS sites?",who:"Site manager",methods:["Interview"],criteria:"Site manager can explain how he/she motivate teammates to find best practices and how he/she allocate resources to implement them."},
{pillar:"leadership",element:"Prioritization",system_cat:"",id:22,level:"Excellence",text:"Does the site management team benchmark Safety and DP trends in logistics industry / other external companies and consider incorporation into site targets/activities?",who:"Site manager or if available, site safety",methods:["Interview"],criteria:"The respondent can give example of Safety and DP trends which the management team referred."},
// ── TM ENGAGEMENT ──
{pillar:"engagement",element:"Capability",system_cat:"",id:1,level:"Ad-hoc",text:"What are H&S risks relevant to your work? What makes you recognize them?",who:"Teammate",methods:["Interview"],criteria:"All respondents are trained to recognize the H&S risks applicable in the site."},
{pillar:"engagement",element:"Action",system_cat:"",id:2,level:"Ad-hoc",text:"What would be considered a priority: complete the operation plan or follow safety procedures?",who:"Teammate",methods:["Interview"],criteria:"All respondents know that safety is considered more important than operation."},
{pillar:"engagement",element:"Capability",system_cat:"",id:3,level:"Ad-hoc",text:"Are you aware of your personal impact on safety? How do you contribute to improve safety?",who:"Site manager",methods:["Interview"],criteria:"Site manager stated that they have an impact on teammate safety. They can show an example of their contribution for safety."},
{pillar:"engagement",element:"Knowledge",system_cat:"",id:4,level:"Ad-hoc",text:"What requirement, based on safety regulations do you explain to teammate?",who:"Supervisor",methods:["Interview"],criteria:"The respondent can show an example that they explain safety requirements based on regulation to teammates."},
{pillar:"engagement",element:"Capability",system_cat:"",id:5,level:"Reactive",text:"Do teammates know how to report incidents?",who:"Teammate",methods:["Interview","Document"],criteria:"All respondents can explain how to report when incident happen. A review of the incident records show that teammates have been reporting incidents and near misses."},
{pillar:"engagement",element:"Action",system_cat:"",id:6,level:"Reactive",text:"What actions do you take during your operations to prevent reoccurrence of an incident which occurred in your site?",who:"Teammate",methods:["Interview"],criteria:"All respondents can explain the actions required to prevent the reoccurrence of incident that occurred in their site."},
{pillar:"engagement",element:"Knowledge",system_cat:"",id:7,level:"Reactive",text:"What incidents and the countermeasures at your site did you receive from managements recently?",who:"Teammate",methods:["Interview","Document"],criteria:"All respondents are informed of recent safety incidents in their site and countermeasures. Their statements match incident records."},
{pillar:"engagement",element:"Capability",system_cat:"",id:8,level:"Standardized",text:"What are the most important safety rules in your site/job and why?",who:"Teammate",methods:["Interview"],criteria:"All respondents can explain their site/job safety rules and why they are important."},
{pillar:"engagement",element:"Knowledge",system_cat:"",id:9,level:"Standardized",text:"Are you regularly trained about your site/job safety rules?",who:"Teammate",methods:["Interview"],criteria:"All respondents agreed that they are regularly reminded and trained of their site/job safety rules."},
{pillar:"engagement",element:"Action",system_cat:"",id:10,level:"Standardized",text:"Are the site/job safety rules being followed?",who:"Tour",methods:["Observation"],criteria:"On-site observation indicates that teammates follow their site/job safety rules."},
{pillar:"engagement",element:"Capability",system_cat:"",id:11,level:"Proactive",text:"Do you understand the greatest potential risks in your work, and how they are controlled?",who:"Teammate",methods:["Interview"],criteria:"All respondents can explain the greatest potential risks in their work and controls to mitigate these risks."},
{pillar:"engagement",element:"Knowledge",system_cat:"",id:12,level:"Proactive",text:"Have you taken training on residual risks in your work? How are you trained?",who:"Teammate",methods:["Interview"],criteria:"All respondents stated that they took the training on residual risks based on the work standard."},
{pillar:"engagement",element:"Action",system_cat:"",id:13,level:"Proactive",text:"Have teammates proposed improvements of H&S risks and risk mitigation measures at the creations or revisions of work standards, training materials, etc?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"Materials indicate that teammates propose improvements of H&S risks and risk mitigation measures at the creations or revisions of work standards."},
{pillar:"engagement",element:"Knowledge",system_cat:"",id:14,level:"Excellence",text:"Are there opportunities to share H&S risks and countermeasures of other sites at the safety meeting in your site?",who:"Teammate",methods:["Document"],criteria:"Meeting material or minute indicate that H&S risks and countermeasures of other sites have been shared at the safety meeting."},
{pillar:"engagement",element:"Capability",system_cat:"",id:15,level:"Excellence",text:"How do you encourage communication between sites to share best-practices and lessons-learned?",who:"Site manager or if available, site safety",methods:["Interview"],criteria:"The respondent can explain how to share H&S risks and control to mitigate these risks between sites."},
{pillar:"engagement",element:"Action",system_cat:"",id:16,level:"Excellence",text:"What response would you expect from your colleague when you act unsafe? What will you do if you find unsafe behavior of your colleague?",who:"Teammate",methods:["Interview"],criteria:"All respondents stated that unsafe behavior is unacceptable and anyone acting unsafe will be corrected by their peers."},
// ── ORGANIZATION ──
{pillar:"organization",element:"Information",system_cat:"",id:1,level:"Ad-hoc",text:"Is the legally required H&S training given to all teammates?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"Compliance evaluation and training records show that H&S training required by regulation has been provided to all teammates."},
{pillar:"organization",element:"Communication",system_cat:"",id:2,level:"Ad-hoc",text:"Do teammates communicate injuries/near-misses/defects to managers, and does management follow up them until close?",who:"Supervisor",methods:["Interview"],criteria:"All respondents can show items recently reported and the examples of follow-ups associated with the reports."},
{pillar:"organization",element:"Communication",system_cat:"",id:3,level:"Ad-hoc",text:"Are H&S/DP rules communicated to teammates when updated/changed/newly created?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"Notifications board, document record etc show that updated/created H&S/DP rules are communicated to teammates."},
{pillar:"organization",element:"Participation",system_cat:"",id:4,level:"Ad-hoc",text:"Does management have defined roles and responsibilities for safety activities?",who:"Site manager",methods:["Interview"],criteria:"The site manager can explain their roles and responsibilities on safety activity in their teams."},
{pillar:"organization",element:"Information",system_cat:"",id:5,level:"Reactive",text:"Are incident investigations carried out by qualified people?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"A review of the last incident record show that the incident was investigated by qualified people and the identified causes were added to the risk tracking."},
{pillar:"organization",element:"Communication",system_cat:"",id:6,level:"Reactive",text:"Do you know what safety initiatives are on going on site and how they are performing?",who:"Site manager",methods:["Interview"],criteria:"All respondents could describe the most recent H&S initiatives to improve H&S management on site, and knew if the results were positive or negative."},
{pillar:"organization",element:"Participation",system_cat:"",id:7,level:"Reactive",text:"Is there collaboration between Logistics safety dept. and site management to address recurring incidents?",who:"Site manager",methods:["Document"],criteria:"A review of the last incident record show evidence that site management and Logistic safety dept. collaborate to prevent reoccurrence."},
{pillar:"organization",element:"Participation",system_cat:"",id:8,level:"Reactive",text:"Do safety training sessions for newcomers reference relevant frequent incidents and severe risks?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"The safety training material for newcomers includes frequent incidents, severe risks and their controls."},
{pillar:"organization",element:"Information",system_cat:"",id:9,level:"Standardized",text:"Are safety rule's effectiveness being evaluated by the H&S (if available), teammates and their site leaders?",who:"Site manager or if available, site safety",methods:["Interview"],criteria:"The site manager or site safety could describe how the H&S rule's effectiveness is evaluated, who is involved and how the processes are improved after evaluation."},
{pillar:"organization",element:"Communication",system_cat:"",id:10,level:"Standardized",text:"When a safety issue would occur, who would you report to?",who:"Teammate",methods:["Interview"],criteria:"All respondents stated that they would report specific safety issues to their site leadership."},
{pillar:"organization",element:"Communication",system_cat:"",id:11,level:"Standardized",text:"What is a content of system and a scope for 'management of change'?",who:"Supervisors",methods:["Interview"],criteria:"All supervisors could explain system and scope of management of change (4M changes)."},
{pillar:"organization",element:"Participation",system_cat:"",id:12,level:"Standardized",text:"Are safety processes updated and improved frequently using findings from the review?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"Document history of H&S procedures and standards showed that safety processes had been updated to address newly identified risks and controls."},
{pillar:"organization",element:"Communication",system_cat:"",id:13,level:"Proactive",text:"Do you communicate with OH&S expert about upcoming changes on site when there are any concerns on Safety?",who:"Site manager",methods:["Interview"],criteria:"The respondent could show an example that he/she discuss the injury/illness/fire risks associated with upcoming changes with internal/external safety expert."},
{pillar:"organization",element:"Information",system_cat:"",id:14,level:"Proactive",text:"Do work/job specific trainings highlight safety risks and processes associated with that work/job?",who:"Supervisor",methods:["Document"],criteria:"Safety instructions and safety training are included in the work/job specific training materials."},
{pillar:"organization",element:"Participation",system_cat:"",id:15,level:"Proactive",text:"Have you involved TMs in periodical review on safety action plans?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"A review of the safety action plans show that teammates were involved and consulted."},
{pillar:"organization",element:"Communication",system_cat:"",id:16,level:"Proactive",text:"What was the feedback from management on your hazard report?",who:"Teammate",methods:["Interview"],criteria:"All respondents stated that management had taken specific actions to address hazards they reported, and these actions have been communicated to them."},
{pillar:"organization",element:"Participation",system_cat:"",id:17,level:"Excellence",text:"Do teammates comply with safety rules and improve risks actively being conscious of safety for not only their selves, but also teammates?",who:"Teammate",methods:["Observation","Interview"],criteria:"Observation in genba showed that teammates are actively conscious of their safety and the safety of others."},
{pillar:"organization",element:"Participation",system_cat:"",id:18,level:"Excellence",text:"Do you engage with external parties to obtain and exchange knowledge on safety?",who:"Site manager",methods:["Interview"],criteria:"The site manager could explain an example that they voluntarily discussed safety with managers from other sites or external parties."},
{pillar:"organization",element:"Information",system_cat:"",id:19,level:"Excellence",text:"Is risk assessment taken when planning new projects/work sessions?",who:"Site manager",methods:["Interview","Document"],criteria:"The site manager said that risk assessment is always done in the early planning stages for upcoming projects/work sessions and could show the recent RA result."},
{pillar:"organization",element:"Communication",system_cat:"",id:20,level:"Excellence",text:"Do you receive feedback from third party on effectiveness of safety management system to improve it?",who:"Site manager or if available, site safety",methods:["Interview"],criteria:"The respondent can explain evaluation results by third party, feedback, and the actions."},
// ── SYSTEM ── (101 questions)
{pillar:"system",element:"Integration",system_cat:"Training and Education",id:1,level:"Ad-hoc",text:"Have teammates been trained on the safety mission statement and high risk activity? (*High-risk activity: risk category III&IV e.g. Work at height, heavy object handling, mobile equipment, caught by machine, tire inflation)",who:"Site manager or if available, site safety",methods:["Document"],criteria:"Training records show all teammates on site have been given training on the Safety Mission Statement. Training records show that required employees have received training for high risk activities."},
{pillar:"system",element:"Design",system_cat:"Training and Education",id:2,level:"Ad-hoc",text:"Are you aware of the regulations concerning safety training?",who:"Site manager",methods:["Interview"],criteria:"The respondent can explain the regulations concerning safety training."},
{pillar:"system",element:"Change & Emergency planning",system_cat:"Emergency Planning",id:3,level:"Ad-hoc",text:"Are the roles & responsibilities of emergency organization defined in the emergency response policy/procedure that complies with legal & local regulations?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"The site emergency response policy/procedure has clarified the roles & responsibilities of each emergency responders and been checked by the safety team to ensure compliance with legal & local regulation."},
{pillar:"system",element:"Integration",system_cat:"Communication",id:4,level:"Ad-hoc",text:"When implementation of regular OH&S communication and OH&S training, does the site manager use the language where the teammates are familiar?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"There is no difference between the language used by teammates and the language used in the sampled communication record or training material."},
{pillar:"system",element:"Integration",system_cat:"LOTO Standard",id:5,level:"Ad-hoc",text:"Do you conduct the LOTO training to the teammates who perform servicing or maintenance tasks, and distribute the Lock-out & Tag-out devices?",who:"Site manager or if available, site safety",methods:["Observation","Document"],criteria:"Training record indicates that the teammates who perform servicing or maintenance tasks have been trained on LOTO. On-site observation indicate that service and maintenance teammates who need LOTO have locks and tags."},
{pillar:"system",element:"Integration",system_cat:"Safety Rules",id:6,level:"Ad-hoc",text:"Do you know the safety rules that are required to be followed? (8 common safety rules, mobile equipment rules, crane & hoist rules and tire inflation rules applying to his/her job position)",who:"Teammate",methods:["Interview"],criteria:"All respondents know the applicable All Bridgestone Safety Rules in their job positions."},
{pillar:"system",element:"Integration",system_cat:"Work at Height",id:7,level:"Ad-hoc",text:"Have you communicated Work at height requirements to teammates performing Work at height?",who:"Supervisor",methods:["Document"],criteria:"There is the training and/or communication record for teammates performing Work at height."},
{pillar:"system",element:"Integration",system_cat:"Mobile Equipment",id:8,level:"Ad-hoc",text:"Have you communicated requirements on mobile equipment to the drivers?",who:"Supervisor",methods:["Document"],criteria:"There is the training and/or communication record for mobile equipment drivers."},
{pillar:"system",element:"Integration",system_cat:"3S",id:9,level:"Ad-hoc",text:"Has the need for 3S (Select & remove, Sort, Keep clean) in the work area been communicated?",who:"Supervisor",methods:["Document"],criteria:"There is evidence that the need of 3S has been communicated to teammates."},
{pillar:"system",element:"Integration",system_cat:"3S",id:10,level:"Ad-hoc",text:"Are 3S visual standards displayed in work area?",who:"Tour",methods:["Observation"],criteria:"3S Documents are displayed in work areas."},
{pillar:"system",element:"Integration",system_cat:"Crane and Hoist",id:11,level:"Ad-hoc",text:"How do you identify and ensure compliance to crane and hoist relevant safety legislation?",who:"Site manager or if available, site safety",methods:["Interview"],criteria:"The respondent can explain the regulations and give at least one method for ensuring compliance."},
{pillar:"system",element:"Integration",system_cat:"Crane and Hoist",id:12,level:"Ad-hoc",text:"Is there an established crane and hoist safety standard that complies with legal requirements?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"There is a crane and hoist safety standard that highlights the legal requirements."},
{pillar:"system",element:"Integration",system_cat:"KY",id:13,level:"Ad-hoc",text:"Have the process and the importance of KY been communicated to the teammates?",who:"Supervisor",methods:["Document"],criteria:"There is evidence of a defined KY process that been communicated with teammates."},
{pillar:"system",element:"Integration",system_cat:"Tire Inflation Operation",id:14,level:"Ad-hoc",text:"Has the tire inflation standard been communicated to the teammates?",who:"Teammate",methods:["Interview"],criteria:"The respondent can explain the key points which need to pay attention to in the tire inflation process."},
{pillar:"system",element:"Integration",system_cat:"Contractor management",id:15,level:"Ad-hoc",text:"Do you certify if contractor employees who perform unload/load the tires have required skills? (e.g. mobile equipment)",who:"Site manager or if available, site safety",methods:["Document"],criteria:"There is evidence to certify that contractor employees who perform unload/load the tires have required skills."},
{pillar:"system",element:"Integration",system_cat:"Large Tire Manual Handling Operation",id:16,level:"Ad-hoc",text:"Are large tire manual handling operations identified and justified? Is there a procedure for each of these operations?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"Operations requiring manual handling of large tires are properly identified and justified. A working procedure exists for each."},
{pillar:"system",element:"Integration",system_cat:"Large Tire Manual Handling Operation",id:17,level:"Ad-hoc",text:"Has the Large Tire Manual Handling Operation procedure been communicated to the relevant people?",who:"Supervisor",methods:["Document"],criteria:"Training records show that all relevant people within the site have been given training on the Large Tire Manual Handling Operations procedure."},
{pillar:"system",element:"Integration",system_cat:"Integrated risk assessment",id:18,level:"Ad-hoc",text:"Have the OH&S and Fire risks in the site evaluated?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"There is evidence that OH&S and/or Fire risks in the site are evaluated."},
{pillar:"system",element:"Integration",system_cat:"Integrated incidents management",id:19,level:"Ad-hoc",text:"To whom do you report when incidents are identified?",who:"Teammate",methods:["Interview"],criteria:"The respondents can explain the person to whom they have to report."},
{pillar:"system",element:"Integration",system_cat:"Integrated incidents management",id:20,level:"Ad-hoc",text:"Are the incidents that occurred at other sites (BS group or external) communicated?",who:"Teammate",methods:["Interview"],criteria:"The respondents can show an example of incident that occurred at other site."},
{pillar:"system",element:"Integration",system_cat:"Training and Education",id:21,level:"Reactive",text:"Have role specific trainings been identified and are given to the necessary people?",who:"Supervisors",methods:["Document"],criteria:"There are knowledge/skill matrix table for each occupation/role, necessary training is described, and the implementation or plan of training can be confirmed."},
{pillar:"system",element:"Design",system_cat:"Training and Education",id:22,level:"Reactive",text:"Are the needs and the content of trainings reviewed and improved after an accident occurs?",who:"Supervisors",methods:["Document"],criteria:"Training documents indicate that training was reviewed after an accident."},
{pillar:"system",element:"Change & Emergency planning",system_cat:"Emergency Planning",id:23,level:"Reactive",text:"Do emergency drills periodically take place?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"There is evidence of an emergency drill performed within the last 12 months."},
{pillar:"system",element:"Change & Emergency planning",system_cat:"Emergency Planning",id:24,level:"Reactive",text:"Are the emergency procedures reviewed and updated based on the results of drills or actual emergencies?",who:"Site manager or if available, site safety",methods:["Interview","Document"],criteria:"The emergency response procedure was updated based on the review on the drills or performance of actual emergencies."},
{pillar:"system",element:"Integration",system_cat:"Communication",id:25,level:"Reactive",text:"Are the causes of accidents/incidents communicated to teammates?",who:"Teammate",methods:["Interview"],criteria:"The respondent indicates that the causes of incidents are communicated to him/her and how these information are communicated."},
{pillar:"system",element:"Design",system_cat:"LOTO Standard",id:26,level:"Reactive",text:"Is the LOTO standard reviewed after incidents, audits or opportunity areas have been identified?",who:"Site manager or if available, site safety",methods:["Interview","Document"],criteria:"The respondent can show an example that LOTO standard is reviewed in response to incidents, audit findings, authority guidance and concerns raised by teammates."},
{pillar:"system",element:"Design",system_cat:"Safety Rules",id:27,level:"Reactive",text:"Is the effectiveness of the Site Safety Rules reviewed after incidents, audits or opportunity areas have been identified?",who:"Site manager or if available, site safety",methods:["Interview"],criteria:"The respondent can show an example that Site Safety Rules are reviewed and improved."},
{pillar:"system",element:"Design",system_cat:"Work at Height",id:28,level:"Reactive",text:"Have work at height controls been reviewed after incidents, audits, or opportunity areas have been identified?",who:"Teammate",methods:["Interview"],criteria:"The respondent can show an example that Work at Height procedures have been reviewed and updated."},
{pillar:"system",element:"Design",system_cat:"Mobile Equipment",id:29,level:"Reactive",text:"Have mobile equipment rules been reviewed after incidents, audits, or opportunity areas have been identified?",who:"Teammate",methods:["Interview"],criteria:"The respondent can show an example that mobile equipment rules have been reviewed and updated."},
{pillar:"system",element:"Integration",system_cat:"3S",id:30,level:"Reactive",text:"Are 3S activities conducted and reviewed regularly?",who:"Site manager",methods:["Interview"],criteria:"The respondent can show evidence that 3S activities are conducted and results are reviewed."},
{pillar:"system",element:"Integration",system_cat:"Crane and Hoist",id:31,level:"Reactive",text:"Are crane and hoist inspection records maintained and reviewed?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"There are complete inspection records for all cranes and hoists, reviewed regularly."},
{pillar:"system",element:"Integration",system_cat:"Crane and Hoist",id:32,level:"Reactive",text:"Do operators know the key safety requirements for crane and hoist operations?",who:"Teammate",methods:["Interview"],criteria:"The respondent can explain the key safety requirements for crane and hoist operations."},
{pillar:"system",element:"Integration",system_cat:"KY",id:33,level:"Reactive",text:"Are KY activities conducted before high-risk tasks?",who:"Site manager",methods:["Interview"],criteria:"The respondent can show evidence that KY is conducted before high-risk tasks."},
{pillar:"system",element:"Integration",system_cat:"Tire Inflation Operation",id:34,level:"Reactive",text:"Are the tire inflation safety rules visible and accessible in the inflation area?",who:"Tour",methods:["Observation"],criteria:"Tire inflation safety rules are displayed and accessible in the work area."},
{pillar:"system",element:"Integration",system_cat:"Tire Inflation Operation",id:35,level:"Reactive",text:"Is the tire inflation area properly guarded/protected?",who:"Tour",methods:["Observation"],criteria:"The tire inflation area has appropriate guarding/protection in place per the safety standard."},
{pillar:"system",element:"Integration",system_cat:"Contractor management",id:36,level:"Reactive",text:"Is there a defined safety induction process for contractors?",who:"Site manager",methods:["Document"],criteria:"There is a documented safety induction process for contractors, and records show it is implemented."},
{pillar:"system",element:"Integration",system_cat:"Large Tire Manual Handling Operation",id:37,level:"Reactive",text:"Are large tire manual handling hazards identified in the risk assessment?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"The risk assessment covers large tire manual handling hazards with appropriate controls."},
{pillar:"system",element:"Integration",system_cat:"Integrated risk assessment",id:38,level:"Reactive",text:"Are the risk assessment results communicated to relevant teammates?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"There is evidence that risk assessment results are communicated to the relevant teammates."},
{pillar:"system",element:"Integration",system_cat:"Integrated risk assessment",id:39,level:"Reactive",text:"Are high-risk items from the RA being tracked and followed up?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"There is a tracking system for high-risk RA items and follow-up actions are evidenced."},
{pillar:"system",element:"Integration",system_cat:"Integrated incidents management",id:40,level:"Reactive",text:"Are root cause analyses conducted for all recorded incidents?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"A review of incident records shows root cause analyses have been conducted for all incidents."},
{pillar:"system",element:"Integration",system_cat:"Integrated incidents management",id:41,level:"Reactive",text:"Are countermeasures from incident investigations tracked to completion?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"There is a tracking system showing countermeasures are implemented and verified as effective."},
{pillar:"system",element:"Change & Emergency planning",system_cat:"Training and Education",id:42,level:"Standardized",text:"Are trainings reviewed and adjusted when safety rules and controls that involve that specific subject matter change?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"Documents show training materials are updated when corresponding safety rules or controls change."},
{pillar:"system",element:"Integration",system_cat:"Emergency Planning",id:43,level:"Standardized",text:"Do emergency response plans which have clear rules and guidelines address each potential scenario?",who:"Site manager or if available, site safety",methods:["Document"],criteria:"The emergency response plan covers all identified potential scenarios with clear guidelines."},
{pillar:"system",element:"Integration",system_cat:"Communication",id:44,level:"Standardized",text:"Is safety information communicated regularly through structured channels (e.g. toolbox talks, safety meetings)?",who:"Teammate",methods:["Interview"],criteria:"The respondent can describe the structured channels through which safety information is regularly communicated."},

// STATE

let responses = {};   // key -> 'yes'|'no'|'na'|'nr'
let evidence = {};    // key -> string
let attachments = {}; // key -> {name, data}
let actionItems = [];
let radarChart1 = null, radarChart2 = null;

const LEVEL_NUM = {
  'Ad-hoc':1,'Reactive':2,'Standardized':3,'Proactive':4,'Excellence':5
};

function qKey(q){ return `${q.pillar}_${q.element}_${q.id}`; }

// ═══════════════════════════════════════════════════════════
// SCORING (per guideline §1.8)
// Element = lowest level where all questions up to that level are Yes
// Pillar = MIN of its elements
// ═══════════════════════════════════════════════════════════
function calcElementScore(questions){
  const levelOrder = ['Ad-hoc','Reactive','Standardized','Proactive','Excellence'];
  const anyAnswered = questions.some(q => {
    const r = responses[qKey(q)];
    return r === 'yes' || r === 'no' || r === 'na' || r === 'nr';
  });
  if(!anyAnswered) return 0;
  let score = 1; // Floor: once any answer given, minimum is Ad-hoc (1)
  for(let lv of levelOrder){
    const lvQs = questions.filter(q => q.level === lv);
    if(lvQs.length === 0) continue;
    const scorable = lvQs.filter(q => responses[qKey(q)] === 'yes' || responses[qKey(q)] === 'no');
    const unanswered = lvQs.filter(q => !responses[qKey(q)]);
    if(scorable.some(q => responses[qKey(q)] === 'no')) break; // Any No → stop
    if(scorable.length > 0 && unanswered.length === 0 && scorable.every(q => responses[qKey(q)] === 'yes')){
      score = LEVEL_NUM[lv]; // All Yes at this level → advance
    } else {
      break; // Incomplete
    }
  }
  return score;
}

function calcPillarScore(pillar){
  const elements = [...new Set(QUESTIONS.filter(q=>q.pillar===pillar).map(q=>q.element))];
  const scores = elements.map(el => {
    const qs = QUESTIONS.filter(q=>q.pillar===pillar && q.element===el);
    return calcElementScore(qs);
  });
  // Only score pillar if at least one element has been started
  const nonZero = scores.filter(s=>s>0);
  if(!nonZero.length) return 0;
  // Use MIN across all elements (0 means not started = pulls pillar down)
  // Per guideline: pillar score = lowest element score
  return Math.min(...scores.filter(s=>s>0));
}

function calcAllScores(){
  const l = calcPillarScore('leadership');
  const e = calcPillarScore('engagement');
  const o = calcPillarScore('organization');
  const s = calcPillarScore('system');
  const awareness = (l>0&&e>0) ? (l+e)/2 : (l||e||0);
  const sysImpl   = (o>0&&s>0) ? (o+s)/2 : (o||s||0);
  const overall   = (awareness>0&&sysImpl>0) ? (awareness+sysImpl)/2 : 0;
  return {l,e,o,s,awareness,sysImpl,overall};
}

function calcElementScores(){
  const pillars = {
    leadership:['Prioritization','Decisions','Support'],
    engagement:['Action','Capability','Knowledge'],
    organization:['Information','Communication','Participation'],
    system:['Design','Integration','Change & Emergency planning']
  };
  const out = {};
  for(const [pillar, els] of Object.entries(pillars)){
    for(const el of els){
      const qs = QUESTIONS.filter(q=>q.pillar===pillar&&q.element===el);
      out[el] = calcElementScore(qs);
    }
  }
  return out;
}

function completionStats(){
  const total = QUESTIONS.length;
  const answered = QUESTIONS.filter(q => responses[qKey(q)] === 'yes' || responses[qKey(q)] === 'no').length;
  return {total, answered, pct: total>0 ? Math.round(answered/total*100) : 0};
}

// RENDER HELPERS
// ═══════════════════════════════════════════════════════════
function levelClass(level){
  return `lvl-${level.replace(/ /g,'-').replace('&','').replace('  ',' ')}` || 'lvl-Ad-hoc';
}
function levelBadge(level){
  return `<span class="q-level-badge ${levelClass(level)}">${level}</span>`;
}
function methodBadge(m){
  return `<span class="method-badge mb-${m.replace(' ','')}">${m==='Interview'?'💬':m==='Observation'?'👁️':'📄'} ${m}</span>`;
}

// ═══════════════════════════════════════════════════════════
// RENDER PILLAR PAGE
// ═══════════════════════════════════════════════════════════
function renderPillar(pillar){
  const container = document.getElementById(`page-${pillar}`);
  const pillarQs = QUESTIONS.filter(q=>q.pillar===pillar);
  const elements = [...new Set(pillarQs.map(q=>q.element))];

  // Scores for summary bar
  const elScores = {};
  elements.forEach(el => {
    const qs = pillarQs.filter(q=>q.element===el);
    elScores[el] = calcElementScore(qs);
  });
  const pillarScore = calcPillarScore(pillar);

  const pillarNames = {leadership:'Leadership',engagement:'Teammate Engagement',organization:'Organization',system:'System'};
  const stats = completionStats();

  let html = `
  <div class="search-bar">
    <input type="text" id="search-${pillar}" placeholder="🔍 Search questions, sub-category..." oninput="filterRows('${pillar}')">
    <select id="level-${pillar}" onchange="filterRows('${pillar}')">
      <option value="">All Levels</option>
      <option>Ad-hoc</option><option>Reactive</option><option>Standardized</option><option>Proactive</option><option>Excellence</option>
    </select>
    <select id="method-${pillar}" onchange="filterRows('${pillar}')">
      <option value="">All Methods</option>
      <option>Interview</option><option>Observation</option><option>Document</option>
    </select>
    <select id="who-${pillar}" onchange="filterRows('${pillar}')">
      <option value="">All Who</option>
      <option>Site manager</option>
      <option>Site manager / Site safety</option>
      <option>Supervisor</option>
      <option>Teammate</option>
      <option>Tour</option>
      <option>Logistics Safety dept.</option>
    </select>
    <button onclick="clearFilter('${pillar}')">Clear</button>
    <div class="search-stats" id="sstats-${pillar}"></div>
  </div>
  <div class="pillar-summary">
    <div>
      <div class="ps-title">${pillarNames[pillar]}</div>
      <div style="font-size:11px;color:var(--bs-muted);margin-top:2px;">Pillar Score: <strong>${pillarScore>0?getLevelName(pillarScore):'Not yet scored'}</strong> ${pillarScore>0?`(${pillarScore}/5)`:''}</div>
    </div>
    <div class="ps-elements">
      ${elements.map(el=>`<div class="ps-elem"><div class="ev" id="elsc-${el.replace(/[^a-zA-Z]/g,'')}">${elScores[el]||'—'}</div><div class="el">${el}</div></div>`).join('')}
    </div>
  </div>`;

  for(const element of elements){
    const elQs = pillarQs.filter(q=>q.element===element);
    const elScore = elScores[element];
    html += `<div class="element-block" id="elblk-${pillar}-${element.replace(/[^a-zA-Z]/g,'')}">
      <div class="element-header">
        <h3>${getElemIcon(element)} ${element}</h3>
        <span class="element-badge" id="elb-${element.replace(/[^a-zA-Z]/g,'')}">${elScore>0?getLevelName(elScore)+` (${elScore}/5)`:'—'}</span>
      </div>`;

    if(pillar==='system'){
      // Group by sub-category
      const cats = [...new Set(elQs.map(q=>q.system_cat))].filter(Boolean);
      for(const cat of cats){
        const catQs = elQs.filter(q=>q.system_cat===cat);
        html += `<div class="subcat-header">📌 ${cat}</div>`;
        catQs.forEach(q => { html += renderQuestion(q); });
      }
    } else {
      elQs.forEach(q => { html += renderQuestion(q); });
    }
    html += `</div>`;
  }

  container.innerHTML = html;
  updateSearchStats(pillar);
}

function renderQuestion(q){
  const key = qKey(q);
  const resp = responses[key] || '';
  const ev = (evidence[key]||'').replace(/"/g,'&quot;');
  const att = attachments[key];
  const attId = `att-${key.replace(/[^a-zA-Z0-9]/g,'_')}`;

  return `<div class="q-row" data-key="${key}" data-level="${q.level}" data-methods="${q.methods.join(',')}" data-text="${q.text.toLowerCase()}" data-who="${(q.who||'').toLowerCase()}" data-cat="${(q.system_cat||'').toLowerCase()}">
    <div class="q-meta">
      <span class="q-num">Q${q.id}</span>
      ${levelBadge(q.level)}
    </div>
    <div class="q-body">
      <div class="q-method-who">
        ${q.methods.map(m=>methodBadge(m)).join('')}
        <span class="who-badge">👤 ${q.who}</span>
      </div>
      <div class="q-text">${q.text}</div>
      <span class="criteria-toggle" onclick="toggleCriteria(this)">▶ Show judgment criteria</span>
      <div class="q-criteria">${q.criteria}</div>
    </div>
    <div class="q-controls">
      <div class="response-btns">
        <button class="r-btn ${resp==='yes'?'sel-yes':''}" onclick="setResp('${key}','yes',this)">✓ Yes</button>
        <button class="r-btn ${resp==='no'?'sel-no':''}" onclick="setResp('${key}','no',this)">✗ No</button>
        <button class="r-btn ${resp==='na'?'sel-na':''}" onclick="setResp('${key}','na',this)">N/A</button>
        <button class="r-btn ${resp==='nr'?'sel-nr':''}" onclick="setResp('${key}','nr',this)">Not rolled out</button>
      </div>
      <div class="evidence-row">
        <input type="text" placeholder="Evidence / reason..." value="${ev}" onchange="setEvidence('${key}',this.value)">
        <button class="attach-btn" onclick="attachFile('${key}','${attId}')">📎 Attach</button>
      </div>
      ${att ? `<div class="attach-info" id="${attId}">📎 ${att.name} <a href="${att.data}" download="${att.name}" style="color:var(--bs-blue);font-size:10px;">Download</a> <span onclick="removeAttach('${key}','${attId}')" style="cursor:pointer;color:var(--bs-red);">✕</span></div>`
             : `<div class="attach-info" id="${attId}"></div>`}
    </div>
  </div>`;
}

function getElemIcon(el){
  const icons={Prioritization:'📌',Decisions:'⚖️',Support:'🤝',Action:'🎯',Capability:'💪',Knowledge:'📚',Information:'📋',Communication:'💬',Participation:'🤲',Design:'🎨',Integration:'🔗'};

function getLevelName(n){

// ═══════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════
function setResp(key, val, btn){
  responses[key] = val;
  const row = btn.closest('.q-row');
  row.querySelectorAll('.r-btn').forEach(b => b.classList.remove('sel-yes','sel-no','sel-na','sel-nr'));
  btn.classList.add(`sel-${val}`);
  updateScoresUI();
  saveAll();
}

function setEvidence(key, val){
  evidence[key] = val;
  saveAll();
}

function toggleCriteria(el){
  const criteria = el.nextElementSibling;
  criteria.classList.toggle('show');
  el.textContent = criteria.classList.contains('show') ? '▼ Hide judgment criteria' : '▶ Show judgment criteria';
}

function attachFile(key, attId){
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt';
  inp.onchange = ev => {
    const file = ev.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = re => {
      attachments[key] = {name:file.name, data:re.target.result};
      const el = document.getElementById(attId);
      if(el) el.innerHTML = `📎 ${file.name} <a href="${re.target.result}" download="${file.name}" style="color:var(--bs-blue);font-size:10px;">Download</a> <span onclick="removeAttach('${key}','${attId}')" style="cursor:pointer;color:var(--bs-red);">✕</span>`;
      saveAll();
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function removeAttach(key, attId){
  delete attachments[key];
  const el = document.getElementById(attId);
  if(el) el.innerHTML = '';
  saveAll();
}

// ═══════════════════════════════════════════════════════════
// SEARCH / FILTER
// ═══════════════════════════════════════════════════════════
function filterRows(pillar){
  const term = (document.getElementById(`search-${pillar}`)?.value||'').toLowerCase();
  const level = document.getElementById(`level-${pillar}`)?.value||'';
  const method = document.getElementById(`method-${pillar}`)?.value||'';
  const who = (document.getElementById(`who-${pillar}`)?.value||'').toLowerCase();
  let visible=0, total=0;
  document.querySelectorAll(`#page-${pillar} .q-row`).forEach(row=>{
    total++;
    let show = true;
    if(term && !row.dataset.text.includes(term) && !row.dataset.who.includes(term) && !row.dataset.cat.includes(term) && !row.dataset.key.includes(term)) show=false;
    if(show && level && row.dataset.level !== level) show=false;
    if(show && method && !row.dataset.methods.includes(method)) show=false;
    if(show && who && !row.dataset.who.toLowerCase().includes(who)) show=false;
    row.classList.toggle('hidden',!show);
    if(show) visible++;
  });
  const el = document.getElementById(`sstats-${pillar}`);
  if(el) el.textContent = `Showing ${visible} of ${total} questions`;
}

function clearFilter(pillar){
  const s=document.getElementById(`search-${pillar}`);
  const l=document.getElementById(`level-${pillar}`);
  const m=document.getElementById(`method-${pillar}`);
  const w=document.getElementById(`who-${pillar}`);
  if(s)s.value=''; if(l)l.value=''; if(m)m.value=''; if(w)w.value='';
  filterRows(pillar);
}

function updateSearchStats(pillar){
  const total = QUESTIONS.filter(q=>q.pillar===pillar).length;
  const el = document.getElementById(`sstats-${pillar}`);
  if(el) el.textContent = `Showing ${total} of ${total} questions`;
}

function updateScoresUI(){
  const sc = calcAllScores();
  const elSc = calcElementScores();
  const stats = completionStats();

  // Header
  const fmt = v => v>0?v.toFixed(1):'—';
  setText('hdr-overall', fmt(sc.overall));
  setText('hdr-awareness', fmt(sc.awareness));
  setText('hdr-system', fmt(sc.sysImpl));
  setText('hdr-pct', stats.pct+'%');

  // Sidebar tabs
  const pillarMap = {leadership:sc.l,engagement:sc.e,organization:sc.o,system:sc.s};
  for(const [p,s] of Object.entries(pillarMap)){
    const el = document.getElementById(`st-${p}`);
    if(el) el.textContent = s>0?`Level ${s} — ${getLevelName(s)}`:'Level —';
  }

  // Element badges & summary bars (re-render element scores)
  const elMap = {
    Prioritization:elSc['Prioritization'],Decisions:elSc['Decisions'],Support:elSc['Support'],
    Action:elSc['Action'],Capability:elSc['Capability'],Knowledge:elSc['Knowledge'],
    Information:elSc['Information'],Communication:elSc['Communication'],Participation:elSc['Participation'],
    Design:elSc['Design'],Integration:elSc['Integration'],'Change & Emergency planning':elSc['Change & Emergency planning']
  };
  for(const [el,score] of Object.entries(elMap)){
    const badge = document.getElementById(`elb-${el.replace(/[^a-zA-Z]/g,'')}`);
    if(badge) badge.textContent = score>0?getLevelName(score)+` (${score}/5)`:'—';
    const sc2 = document.getElementById(`elsc-${el.replace(/[^a-zA-Z]/g,'')}`);
    if(sc2) sc2.textContent = score||'—';
  }

  // Dashboard if open
  if(document.getElementById('page-dashboard').classList.contains('active')){
    renderDashboard();
  }
}

function addAction(){
  actionItems.push({item:'',owner:'',due:''});
  const list=document.getElementById('action-list');
  if(list){
    const i=actionItems.length-1;
    const div=document.createElement('div');
    div.className='action-row';
    div.innerHTML=`<input placeholder="Action item" onchange="actionItems[${i}].item=this.value;saveAll()">
      <input placeholder="Responsible" style="max-width:130px" onchange="actionItems[${i}].owner=this.value;saveAll()">
      <input type="date" style="max-width:130px" onchange="actionItems[${i}].due=this.value;saveAll()">`;

  }
  saveAll();

function switchPage(page){
  document.querySelectorAll('.pillar-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.side-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelector(`.side-tab[data-page="${page}"]`).classList.add('active');
  if(page==='dashboard') renderDashboard();
  else {
    const container=document.getElementById(`page-${page}`);
    if(!container.innerHTML.trim()) renderPillar(page);
    else updateScoresUI();
  }
}

function showFlash(msg){
  const el=document.getElementById('saved-flash');
  if(!el) return;
  el.textContent=msg||'✓ Saved';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

function saveAll(){
  try {
    localStorage.setItem('sma_responses',JSON.stringify(responses));
    localStorage.setItem('sma_evidence',JSON.stringify(evidence));
    localStorage.setItem('sma_actions',JSON.stringify(actionItems));
    localStorage.setItem('sma_attachments',JSON.stringify(attachments));
    localStorage.setItem('sma_site',JSON.stringify({
      site:document.getElementById('si-site')?.value||'',
      date:document.getElementById('si-date')?.value||'',
      assessor:document.getElementById('si-assessor')?.value||'',
      type:document.getElementById('si-type')?.value||'validation'
    }));
  } catch(e){ console.warn('LocalStorage save failed:',e.message); }
}

function saveToLocalAndFile(){
  saveAll();
  exportJSON(true);
  showFlash('✓ Saved to browser + file downloaded');
}

function loadAll(){
  try {
    const r=localStorage.getItem('sma_responses'); if(r) Object.assign(responses,JSON.parse(r));
    const ev=localStorage.getItem('sma_evidence'); if(ev) Object.assign(evidence,JSON.parse(ev));
    const ac=localStorage.getItem('sma_actions'); if(ac) actionItems=JSON.parse(ac);
    const at=localStorage.getItem('sma_attachments'); if(at) Object.assign(attachments,JSON.parse(at));
    const si=localStorage.getItem('sma_site');
    if(si){
      const s=JSON.parse(si);
      if(document.getElementById('si-site')) document.getElementById('si-site').value=s.site||'';
      if(document.getElementById('si-date')) document.getElementById('si-date').value=s.date||'';
      if(document.getElementById('si-assessor')) document.getElementById('si-assessor').value=s.assessor||'';
      if(document.getElementById('si-type')) document.getElementById('si-type').value=s.type||'validation';
    }
  } catch(e){ console.warn('Load failed:',e); }
}

function loadFromFile(event){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const obj=JSON.parse(e.target.result);
      if(obj.responses) Object.assign(responses,obj.responses);
      if(obj.evidence) Object.assign(evidence,obj.evidence);
      if(obj.attachments) Object.assign(attachments,obj.attachments);
      if(obj.actionItems) actionItems=obj.actionItems;
      if(obj.meta){
        if(document.getElementById('si-site')) document.getElementById('si-site').value=obj.meta.site||'';
        if(document.getElementById('si-date')) document.getElementById('si-date').value=obj.meta.date||'';
        if(document.getElementById('si-assessor')) document.getElementById('si-assessor').value=obj.meta.assessor||'';
        if(document.getElementById('si-type')) document.getElementById('si-type').value=obj.meta.type||'validation';
      }
      saveAll();
      ['leadership','engagement','organization','system'].forEach(p=>{ document.getElementById(`page-${p}`).innerHTML=''; });
      const activePage=document.querySelector('.pillar-page.active');
      if(activePage){
        const pageId=activePage.id.replace('page-','');
        if(pageId==='dashboard') renderDashboard(); else renderPillar(pageId);
      }
      updateScoresUI();
      showFlash('✓ Session loaded from file');
    } catch(err){ alert('Failed to load file: '+err.message); }
  };
  reader.readAsText(file);
  event.target.value='';
}

function confirmReset(){
  if(confirm('Reset all responses and data? This cannot be undone.')){
    responses={}; evidence={}; attachments={}; actionItems=[];
    localStorage.clear();
    location.reload();
  }
}

      const addr = (r,c) => XLSX.utils.encode_cell({r:r-1,c:c-1});

      function writeCell(ws, row, col, value){
        if(!value && value !== 0) return;
        const a = addr(row, col);
        if(!ws[a]) ws[a] = {};

        for(const [qid, row] of Object.entries(rowMap)){
          const el = EL_MAP[pillar][parseInt(qid)] || '';
          const key = `${pillar}_${el}_${qid}`;
          const r = responses[key] || '';
          const ev = evidence[key] || '';
          const val = resp(r);
          if(val) writeCell(ws, row, respCol, val);
          if(ev)  writeCell(ws, row, evidCol, ev);
        }
        // Remove Japanese (lines after \n) from question/who cells
        for(const cellAddr in ws){
          if(cellAddr[0]==='!') continue;

          if(cell && cell.t==='s' && cell.v && cell.v.includes('\n')){
            cell.v = cell.v.split('\n')[0].trim();
            if(cell.w) cell.w = cell.v;
          }
        }
      }

      writePillar('Leadership',    'leadership',   L_ROWS, 11, 12);
      writePillar('TM Engagement', 'engagement',   E_ROWS, 11, 12);
